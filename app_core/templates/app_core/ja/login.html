{% extends 'app_core/base.html' %}

{% block title %}ログイン — ナレッジ管理システム{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-lg">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <h2 class="mb-3">
                        <i class="bi bi-book text-primary"></i>
                        ナレッジハブ
                    </h2>
                    <p class="text-muted">ナレッジ管理システムにサインインしてください</p>
                </div>

                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label for="username" class="form-label">ユーザー名</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-person"></i>
                            </span>
                            <input type="text"
                                   class="form-control"
                                   id="username"
                                   name="username"
                                   required
                                   autofocus
                                   placeholder="ユーザー名を入力">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label">パスワード</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-lock"></i>
                            </span>
                            <input type="password"
                                   class="form-control"
                                   id="password"
                                   name="password"
                                   required
                                   placeholder="パスワードを入力">
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-box-arrow-in-right"></i> サインイン
                    </button>
                </form>

                <hr class="my-4">

                <div class="text-center text-muted small">
                    <i class="bi bi-shield-check"></i> セキュアなオフラインナレッジ管理システム
                </div>
            </div>
        </div>

        <div class="text-center mt-3 text-muted small">
            <p>
                <i class="bi bi-info-circle"></i>
                このシステムはローカルAIモデルで完全オフライン動作します
            </p>
        </div>
    </div>
</div>
{% endblock %}
